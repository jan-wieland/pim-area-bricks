  adminMenuDocs:
    label: "JW PimAreasBricks"
    item: "JW Docs"
    docs: "Documentation"
    title: "JW PimAreaBricks docs"
  docsTexts:
    introduction: "<p>This documentation is written in abbreviated form and assumes knowledge of editorial work with CMS systems and Pimcore. The goal of this &quot;JW Pim-Area-Bricks&quot; bundle is to simplify the integration of page elements for developers and to give editors the greatest possible independent design freedom.</p>
      <p>To keep the whole thing simple and clear, a certain compromise is needed between completely freely configurable elements and a clear concept that thus remains manageable.To increase design diversity, there is a choice between several style variations in some places.</p>
      <h2>Page contents</h2>
      <p>To maintain maximum flexibility, there are individual areas under &quot;Layout Elements&quot;. However, it is recommended to use &quot;Page Contents&quot;. It is also possible to create your own page content from layout elements using &quot;Structure&quot; → &quot;Custom page Content&quot;, which will then behave as a single element in the Flexbox.</p>"
    flexHead: "Flexboxes and Grids"
    flexText: "<p>A unique feature and proprietary development is the organization of page content as flexboxes, which essentially eliminates the need for a grid. This allows each piece of page content to be defined with a width that it then occupies based on defined breakpoints, e.g., first ½, then ⅓, and finally ¼ of the content width.</p><p>Unlike a traditional grid, page elements can be displayed as a grid without requiring a surrounding grid frame. However, such a &quot;Grid&quot; is also available.</p>"
